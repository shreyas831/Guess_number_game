{% extends "base.html" %}

{% block title %}Select Difficulty{% endblock %}

{% block content %}
<div class="game-container">
    <div class="text-center mb-5">
        <div class="emoji-large">🎯</div>
        <h2 class="fw-bold text-primary">Choose Difficulty</h2>
        <p class="text-muted">Select your challenge level for {{ mode.title() }} Mode</p>
    </div>

    <form action="{{ url_for('start_game', mode=mode) }}" method="post" id="difficultyForm">
        <div class="row g-4">
            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100">
                    <div class="card-body text-center">
                        <input type="radio" class="btn-check" name="difficulty" id="easy" value="1" checked onchange="document.getElementById('difficultyForm').submit()">
                        <label class="btn btn-outline-success btn-game w-100 h-100 d-flex flex-column" for="easy">
                            <div class="mb-2" style="font-size: 2rem;">🟢</div>
                            <h5 class="card-title mb-2">Easy</h5>
                            <small class="text-muted">1-20 range<br>8 attempts<br>3 hints</small>
                        </label>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100">
                    <div class="card-body text-center">
                        <input type="radio" class="btn-check" name="difficulty" id="medium" value="2" onchange="document.getElementById('difficultyForm').submit()">
                        <label class="btn btn-outline-warning btn-game w-100 h-100 d-flex flex-column" for="medium">
                            <div class="mb-2" style="font-size: 2rem;">🟡</div>
                            <h5 class="card-title mb-2">Medium</h5>
                            <small class="text-muted">1-50 range<br>6 attempts<br>2 hints</small>
                        </label>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100">
                    <div class="card-body text-center">
                        <input type="radio" class="btn-check" name="difficulty" id="hard" value="3" onchange="document.getElementById('difficultyForm').submit()">
                        <label class="btn btn-outline-danger btn-game w-100 h-100 d-flex flex-column" for="hard">
                            <div class="mb-2" style="font-size: 2rem;">🔴</div>
                            <h5 class="card-title mb-2">Hard</h5>
                            <small class="text-muted">1-100 range<br>4 attempts<br>1 hint</small>
                        </label>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100">
                    <div class="card-body text-center">
                        <input type="radio" class="btn-check" name="difficulty" id="custom" value="4" onchange="document.getElementById('difficultyForm').submit()">
                        <label class="btn btn-outline-primary btn-game w-100 h-100 d-flex flex-column" for="custom">
                            <div class="mb-2" style="font-size: 2rem;">⚙️</div>
                            <h5 class="card-title mb-2">Custom</h5>
                            <small class="text-muted">Set your own<br>rules and<br>limits</small>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5 d-none d-md-block">
            <button type="submit" class="btn btn-primary btn-game btn-lg">
                <i class="fas fa-play me-2"></i>Start Game
            </button>
            <a href="{{ url_for('menu') }}" class="btn btn-outline-secondary btn-game btn-lg ms-3">
                <i class="fas fa-arrow-left me-2"></i>Back to Menu
            </a>
        </div>
    </form>
</div>
{% endblock %}
